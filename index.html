<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח חופשות</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0;padding:20px}
.wrap{max-width:1000px;margin:auto}
.header{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px}
h1{margin:0}
.rules{margin-top:10px}
.badge{display:inline-block;background:#eef2f7;padding:6px 10px;border-radius:999px;margin:4px;font-size:12px}

.controls{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap}
button,select{padding:10px;border-radius:10px;border:1px solid #ccc}

.tabs{margin-top:15px}
.tab{padding:10px 14px;border-radius:10px;border:1px solid #ccc;cursor:pointer}
.tab.active{background:#111;color:#fff}

.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #ddd}

.me{background:#059669;color:#fff;padding:6px 12px;border-radius:999px}
.her{background:#f59e0b;color:#fff;padding:6px 12px;border-radius:999px}

.hidden{display:none}
</style>
</head>

<body>
<div class="wrap">

<div class="header">
  <h1>לוח מעקב חופשות וחגים</h1>

  <div class="rules">
    <span class="badge">שעת החלפה 08:00</span>
    <span class="badge">ימי הולדת אצלי</span>
    <span class="badge">חוגים אצלי</span>
    <span class="badge">חג גובר על שגרה</span>
  </div>

  <div class="controls">
    <select id="year">
      <option value="2023">2023</option>
      <option value="2024">2024</option>
      <option value="2025" selected>2025–2026</option>
    </select>

    <button onclick="copyLink()">העתק לינק</button>
    <button onclick="share()">שיתוף</button>
  </div>

  <div class="tabs">
    <span class="tab active" onclick="showTab('holidays',this)">חגים</span>
    <span class="tab" onclick="showTab('classes',this)">חוגים</span>
    <span class="tab" onclick="showTab('birthdays',this)">ימי הולדת</span>
    <span class="tab" onclick="showTab('expenses',this)">הוצאות</span>
  </div>
</div>

<div id="holidays"></div>

<div id="classes" class="hidden">
  <div class="card"><b>חוגים</b><span class="me">אצלי</span></div>
</div>

<div id="birthdays" class="hidden">
  <div class="card"><b>ימי הולדת</b><span class="me">אצלי</span></div>
</div>

<div id="expenses" class="hidden">
  <div class="card"><b>רפואה / צהרון / חוגים</b></div>
</div>

</div>

<script>

// 🔥 דאטה מתוקן
const data = {
  "2025":[
    {name:"ראש השנה", owner:"mother"},
    {name:"כיפור", owner:"father"},
    {name:"סוכות א", owner:"mother"},
    {name:"סוכות ב", owner:"father"},
    {name:"חנוכה", owner:"mother"},

    {name:"פורים", owner:"mother"},
    {name:"פסח א", owner:"mother"},
    {name:"פסח ב", owner:"father"},

    {name:"ערב יום הזיכרון", owner:"mother"},
    {name:"יום העצמאות", owner:"father"},

    {name:"ל״ג בעומר", owner:"father"},
    {name:"שבועות", owner:"father"}
  ],

  "2024":[
    {name:"ראש השנה", owner:"father"},
    {name:"כיפור", owner:"mother"},
    {name:"סוכות", owner:"father"},
    {name:"פסח", owner:"mother"},
    {name:"עצמאות", owner:"mother"}
  ],

  "2023":[
    {name:"ראש השנה", owner:"father"},
    {name:"כיפור", owner:"mother"},
    {name:"סוכות", owner:"father"},
    {name:"פסח", owner:"mother"},
    {name:"עצמאות", owner:"mother"}
  ]
};

function render(){
  const year=document.getElementById("year").value;
  const list=data[year]||[];

  document.getElementById("holidays").innerHTML=
    list.map(x=>`
      <div class="card">
        <div>${x.name}</div>
        <div class="${x.owner==="father"?"me":"her"}">
          ${x.owner==="father"?"אצלי":"אצלה"}
        </div>
      </div>
    `).join("");
}

function showTab(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll("#holidays,#classes,#birthdays,#expenses")
    .forEach(d=>d.classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("הועתק");
}

function share(){
  if(navigator.share){
    navigator.share({url:location.href});
  }else{
    copyLink();
  }
}

document.getElementById("year").addEventListener("change",render);

render();

</script>
</body>
</html>
