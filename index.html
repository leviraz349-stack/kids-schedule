<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>לוח חופשות</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0;padding:20px}
.wrap{max-width:800px;margin:auto}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid #ddd}
.me{background:#059669;color:#fff;padding:6px 14px;border-radius:999px}
.her{background:#f59e0b;color:#fff;padding:6px 14px;border-radius:999px}
select{padding:10px;border-radius:10px;margin-bottom:20px}
</style>
</head>

<body>
<div class="wrap">

<select id="yearSelect">
  <option value="2023">2023</option>
  <option value="2024">2024</option>
  <option value="2025-2026" selected>2025–2026</option>
</select>

<div id="list"></div>

</div>

<script>

// 🔥 פונקציה שקובעת אצלי / אצלה לפי שנה
function getOwner(year){
  return year % 2 === 0 ? "mother" : "father";
}

// 🔥 כל החגים עם השנה האמיתית שלהם
const holidays = [
  {name:"ראש השנה", year:2025},
  {name:"כיפור", year:2025},
  {name:"סוכות א", year:2025},
  {name:"סוכות ב", year:2025},
  {name:"חנוכה", year:2025},

  {name:"פורים", year:2026},
  {name:"פסח א", year:2026},
  {name:"פסח ב", year:2026},
  {name:"עצמאות", year:2026},
  {name:"ל״ג בעומר", year:2026},
  {name:"שבועות", year:2026}
];

function render(){
  const val = document.getElementById("yearSelect").value;
  let data = [];

  if(val === "2025-2026"){
    data = holidays;
  }

  if(val === "2024"){
    data = holidays.map(h => ({...h, year:h.year-1}));
  }

  if(val === "2023"){
    data = holidays.map(h => ({...h, year:h.year-2}));
  }

  const html = data.map(h=>{
    const owner = getOwner(h.year);
    return `
      <div class="card">
        <div>${h.name} (${h.year})</div>
        <div class="${owner === "father" ? "me" : "her"}">
          ${owner === "father" ? "אצלי" : "אצלה"}
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("list").innerHTML = html;
}

document.getElementById("yearSelect").addEventListener("change", render);

render();

</script>

</body>
</html>
